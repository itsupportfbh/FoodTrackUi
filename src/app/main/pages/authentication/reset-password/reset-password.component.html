<div class="reset-password-page auth-wrapper auth-v2">
  <div class="auth-inner row m-0">

    <!-- Brand -->
    <a class="brand-logo" href="javascript:void(0);">
      <img [src]="coreConfig?.app?.appLogoImage" alt="brand-logo" class="brand-image" />
      <h2 class="brand-text">UnityWorks ERP</h2>
    </a>

    <!-- Left Side -->
    <div class="d-none d-lg-flex col-lg-7 align-items-center justify-content-center left-side">
      <div class="left-content text-center">
        <img
          class="img-fluid reset-img"
          [src]="
            coreConfig?.layout?.skin === 'dark'
              ? 'assets/images/pages/reset-password-v2-dark.svg'
              : 'assets/images/pages/reset-password-v2.svg'
          "
          alt="Reset password"
        />
      </div>
    </div>

    <!-- Right Side -->
    <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center right-side">
      <div class="reset-card">
        <div class="card-header-custom">
          <h2>Reset Password</h2>
          <p>Enter your new password below</p>
        </div>

        <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="reset-form">
          <div class="form-group">
            <label>Email</label>
            <div class="input-box readonly-box">
              <i data-feather="mail"></i>
              <input class="form-control" type="email" formControlName="email" readonly />
            </div>
          </div>

          <div class="form-group">
            <label>New Password</label>
            <div class="input-box" [ngClass]="{ 'is-invalid': submitted && f.newPassword.errors }">
              <i data-feather="shield"></i>
              <input
                class="form-control"
                [type]="passwordTextType ? 'text' : 'password'"
                formControlName="newPassword"
                placeholder="Enter new password"
              />
              <span class="toggle-icon" (click)="togglePassword('new')">
                <i [attr.data-feather]="passwordTextType ? 'eye' : 'eye-off'"></i>
              </span>
            </div>
            <small class="text-danger" *ngIf="submitted && f.newPassword.errors?.required">
              New password is required
            </small>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-box" [ngClass]="{ 'is-invalid': submitted && f.confirmPassword.errors }">
              <i data-feather="check-circle"></i>
              <input
                class="form-control"
                [type]="confirmPasswordTextType ? 'text' : 'password'"
                formControlName="confirmPassword"
                placeholder="Confirm new password"
              />
              <span class="toggle-icon" (click)="togglePassword('confirm')">
                <i [attr.data-feather]="confirmPasswordTextType ? 'eye' : 'eye-off'"></i>
              </span>
            </div>
            <small class="text-danger" *ngIf="submitted && f.confirmPassword.errors?.required">
              Confirm password is required
            </small>
          </div>

          <button type="submit" class="btn btn-primary btn-block reset-btn">
            Reset Password
          </button>
        </form>

        <div class="back-link text-center">
          <a routerLink="/pages/authentication/login-v2">
            <i data-feather="arrow-left" class="mr-25"></i>
            Back to login
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
