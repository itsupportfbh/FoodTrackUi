<div class="change-password-page">
  <div class="form-card">
    <div class="form-header">
      <h2>Change Password</h2>
      <p>Update your password securely</p>
    </div>

    <form (ngSubmit)="submit()" #passwordForm="ngForm" novalidate>
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper readonly-field">
          <i data-feather="mail"></i>
          <input
            type="email"
            name="email"
            [(ngModel)]="form.email"
            readonly
          />
        </div>
      </div>

<div class="form-group">
  <label>Old Password</label>
  <div class="input-wrapper">
    <i data-feather="lock"></i>
    <input
      [type]="showOldPassword ? 'text' : 'password'"
      name="oldPassword"
      [(ngModel)]="form.oldPassword"
      placeholder="Enter old password"
      required
    />
    <button
      type="button"
      class="toggle-btn"
      (click)="toggleOldPassword()"
    >
      <i [data-feather]="showOldPassword ? 'eye-off' : 'eye'"></i>
    </button>
  </div>
</div>

      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrapper">
          <i data-feather="lock"></i>
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            name="newPassword"
            [(ngModel)]="form.newPassword"
            placeholder="Enter new password"
            required
            (input)="onPasswordChange()"
          />
          <button
            type="button"
            class="toggle-btn"
            (click)="toggleNewPassword()"
          >
            <i [data-feather]="showNewPassword ? 'eye-off' : 'eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <i data-feather="lock"></i>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            name="confirmPassword"
            [(ngModel)]="form.confirmPassword"
            placeholder="Re-enter new password"
            required
            (input)="onPasswordChange()"
          />
          <button
            type="button"
            class="toggle-btn"
            (click)="toggleConfirmPassword()"
          >
            <i [data-feather]="showConfirmPassword ? 'eye-off' : 'eye'"></i>
          </button>
        </div>
      </div>

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="button-row">
        <button type="button" class="btn-cancel" (click)="resetForm()">
          Cancel
        </button>
        <button type="submit" class="btn-submit">
          Save Password
        </button>
      </div>
    </form>
  </div>
</div>
