<div class="request-page" *ngIf="!loading; else loadingTpl">
  <div class="request-card">
    <div class="request-header">
      <div class="header-left">
        <button type="button" class="btn-back" (click)="cancel()">
          <i data-feather="arrow-left"></i>
        </button>

        <div class="header-text">
          <h2 class="title">Order Override</h2>
          <p class="sub-title">Plan-wise cuisine override entry</p>
        </div>
      </div>

      <div class="header-badge">
        <span class="badge-label">Total Override Qty</span>
        <span class="badge-value">{{ getTotalOverrideQty() }}</span>
      </div>
    </div>

    <div class="request-body">
      <div class="top-section">
        <div class="header-grid override-header-grid">
          <div class="form-group">
            <label>Request No</label>
            <input
              type="text"
              class="form-control-custom readonly-input"
              [value]="model.header.requestNo || ''"
              readonly
            />
          </div>

          <div class="form-group">
            <label>Override From Date</label>
            <input
              type="text"
              class="form-control-custom readonly-input"
              [value]="fromDate"
              readonly
            />
          </div>

          <div class="form-group">
            <label>Override To Date</label>
            <input
              type="text"
              class="form-control-custom readonly-input"
              [value]="toDate"
              readonly
            />
          </div>

          <div class="form-group">
            <label>Request From Date</label>
            <input
              type="text"
              class="form-control-custom readonly-input"
              [value]="model.header.requestFromDate ? (model.header.requestFromDate | date:'yyyy-MM-dd') : ''"
              readonly
            />
          </div>

          <div class="form-group">
            <label>Request To Date</label>
            <input
              type="text"
              class="form-control-custom readonly-input"
              [value]="model.header.requestToDate ? (model.header.requestToDate | date:'yyyy-MM-dd') : ''"
              readonly
            />
          </div>
        </div>

      <div class="plan-selection-card">
  <div class="plan-selection-head">
    <h5>Plan Type</h5>
    <small>Selected plan accordion will open automatically</small>
  </div>

  <div class="plan-checkbox-row">
    <label
      class="plan-checkbox-option"
      *ngFor="let plan of plans"
      [class.checked]="selectedPlans.includes(plan)"
      [class.basic]="plan === 'Basic'"
      [class.standard]="plan === 'Standard'"
      [class.premium]="plan === 'Premium'"
    >
      <input
        type="checkbox"
        [checked]="selectedPlans.includes(plan)"
        (change)="onPlanToggle(plan, $event)"
      />

      <span class="plan-check-icon">
        <i data-feather="check"></i>
      </span>

      <span class="plan-name">{{ plan }}</span>
    </label>
  </div>
</div>
      </div>

      <div class="accordion-wrapper" *ngIf="planGroups.length > 0; else noDataTpl">
       <div
  class="session-accordion"
  *ngFor="let group of getVisiblePlanGroups(); let gi = index"
>
          <button
            type="button"
            class="accordion-header"
            (click)="toggleAccordion(group)"
          >
            <div class="accordion-title-wrap">
              <span class="accordion-title">{{ group.planType }}</span>
              <span class="accordion-count">{{ group.lines.length }} cuisines</span>
            </div>

            <span class="accordion-icon" [class.open]="group.isOpen">
              <i data-feather="chevron-down"></i>
            </span>
          </button>

          <div class="accordion-body" *ngIf="group.isOpen">
            <div class="create-table-wrap">
              <table class="table create-line-table">
                <thead>
                  <tr>
                    <th>Cuisine</th>
                    <th>Existing Qty</th>
                    <th>Override Qty</th>
                  </tr>
                </thead>

                <tbody>
                  <tr *ngFor="let row of group.lines; let li = index">
                    <td>
                      <div class="cell-text strong">{{ row.cuisineName }}</div>
                    </td>

                    <td>
                      <span class="qty-pill readonly">{{ row.baseQty }}</span>
                    </td>

                    <td>
                      <input
                        type="number"
                        min="0"
                        class="form-control qty-input"
                        [(ngModel)]="row.overrideQty"
                        [name]="'overrideQty_' + gi + '_' + li"
                        [disabled]="!selectedPlans.includes(group.planType)"
                        (ngModelChange)="onOverrideQtyChange(row, $event)"
                        placeholder="0"
                      />
                    </td>
                  </tr>

                  <tr *ngIf="!group.lines?.length">
                    <td colspan="3" class="empty-inline">No cuisines found</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <ng-template #noDataTpl>
        <div class="empty-row-card">
          <div class="empty-title">No override lines found</div>
        </div>
      </ng-template>

      <div class="form-actions">
        <button
          type="button"
          class="btn btn-primary btn-save"
          (click)="save()"
          [disabled]="saving"
        >
          {{ saving ? 'Saving...' : 'Save Override' }}
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="loading-box">Loading override screen...</div>
</ng-template>
