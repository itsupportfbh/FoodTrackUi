<div class="price-list-page">
  <div class="content-wrapper p-0">
    <div class="content-body">
      <section class="users-list-wrapper">
        <div class="card price-list-card">
          <div class="master-header">
            <div class="master-header-left">
              <!-- <div class="eyebrow">Price Configuration</div> -->
              <h3 class="master-title">Price Configuration</h3>
              <!-- <p class="master-subtitle">
                Common Basic / Standard / Premium pricing for all companies
              </p> -->
            </div>

            <button
              type="button"
              class="btn btn-primary master-edit-btn"
              rippleEffect
              (click)="editPrice()"
            >
              <i data-feather="edit-2" class="btn-icon"></i>
              <span>{{ planCards?.length ? 'Edit Price' : 'Add Price' }}</span>
            </button>
          </div>

          <div *ngIf="loading" class="state-box">
            Loading price details...
          </div>

          <ng-container *ngIf="!loading && summary">
            <!-- <div class="master-summary">
              <div class="summary-left">
                <div class="summary-badge">{{ summary.title }}</div>
                <div class="summary-meta">
                  <div class="meta-chip">
                    <span class="meta-label">Plans</span>
                    <span class="meta-value">{{ summary.plansText }}</span>
                  </div>

                  <div class="meta-chip">
                    <span class="meta-label">Sessions</span>
                    <span class="meta-value">{{ summary.sessionsText }}</span>
                  </div>

                  <div class="meta-chip">
                    <span class="meta-label">Effective From</span>
                    <span class="meta-value">{{ summary.effectiveFromDisplay }}</span>
                  </div>
                </div>
              </div>

              <button
                type="button"
                class="icon-edit-btn"
                (click)="editPrice()"
                title="Edit Price"
              >
                <i data-feather="edit" style="width: 16px; height: 16px;"></i>
              </button>
            </div> -->

            <div class="plan-card-grid">
              <div class="plan-card basic" *ngFor="let item of planCards" [ngClass]="item.planType.toLowerCase()">
                <div class="plan-card-top">
                  <div class="plan-name">{{ item.planType }}</div>
                  <div class="plan-price">S$ {{ formatAmount(item.perDay) }}</div>
                </div>

                <div class="plan-price-label">Per Day</div>

                <div class="plan-details">
                  <div class="detail-row">
                    <span>Monthly</span>
                    <strong>S$ {{ formatAmount(item.monthly) }}</strong>
                  </div>

                  <div class="detail-row">
                    <span>Effective From</span>
                    <strong>{{ item.effectiveFromDisplay }}</strong>
                  </div>

                  <div class="detail-row sessions-row">
                    <span>Sessions</span>
                    <strong>{{ item.sessionNames }}</strong>
                  </div>
                </div>
              </div>
            </div>
          </ng-container>

          <div *ngIf="!loading && !summary" class="state-box empty">
            No default price records found.
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
