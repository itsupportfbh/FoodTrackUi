<div class="price-master-page">
  <div class="card price-master-card">
    <div class="card-header">
      <div class="header-title-group">
        <button type="button" class="btn btn-back" (click)="goBackToList()">
          <i class="fas fa-arrow-left"></i>
          <span>Back</span>
        </button>

        <div class="title-wrap">
          <h4 class="mb-0">Price Master</h4>
          <p class="page-subtitle mb-0">
            Select company first. Assigned sessions will load automatically.
          </p>
        </div>
      </div>
    </div>

    <div class="card-body">
      <!-- Company -->
      <div class="company-row">
        <div class="form-field company-field">
          <label class="form-label" for="companyId">Company</label>

          <ng-select
            id="companyId"
            [items]="companyList"
            bindLabel="companyName"
            bindValue="id"
            [searchable]="true"
            [clearable]="true"
            [closeOnSelect]="true"
            placeholder="Select Company"
            [(ngModel)]="selectedCompanyId"
            (ngModelChange)="onCompanyChange($event)"
            appendTo="body">
          </ng-select>
        </div>
      </div>

      <div *ngIf="sessionLoading" class="loading-box">
        Loading assigned sessions...
      </div>

      <div
        class="empty-box"
        *ngIf="selectedCompanyId && !sessionLoading && sessionRateRows.length === 0">
        No session mapped for this company.
      </div>

      <!-- Auto session rows -->
     <div
  class="session-rate-section"
  *ngIf="selectedCompanyId && !sessionLoading && sessionRateRows.length > 0"
>
  <div class="session-rate-header">
    <div>Session</div>
    <div>Rate (S$)</div>
    <div>Effective From</div>
  </div>

  <div class="session-rate-row" *ngFor="let row of sessionRateRows; let i = index">
    <div class="session-name-box">
      {{ row.sessionName }}
    </div>

    <div>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="row.rate"
        placeholder="Enter Rate"
      />
    </div>

    <div>
      <input
        type="date"
        class="form-control"
        [(ngModel)]="row.effectiveFrom"
      />
    </div>
  </div>
</div>

      <div class="action-row" *ngIf="selectedCompanyId && sessionRateRows.length > 0">
        <button
          type="button"
          class="btn btn-save"
          [disabled]="saving"
          (click)="saveRates()">
          {{ saving ? 'Saving...' : 'Save Rate' }}
        </button>
      </div>
    </div>
  </div>
</div>
