<div class="price-master-page">
  <div class="card">
    <div class="card-header">
      <div class="header-title-group">
        <button type="button" class="btn btn-back" (click)="goBackToList()">
          <i class="fas fa-arrow-left"></i>
          <span>Back</span>
        </button>
        <h4 class="mb-0">Price Master</h4>
      </div>
    </div>

    <div class="card-body">
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label" for="companyId">Company</label>

          <ng-select
            id="companyId"
            [items]="companyList"
            bindLabel="companyName"
            bindValue="id"
            [searchable]="false"
            [clearable]="true"
            [closeOnSelect]="true"
            [virtualScroll]="true"
            placeholder="Select Company"
            name="companyId"
            [(ngModel)]="selectedCompanyId"
            (ngModelChange)="onSelectionChange()"
            appendTo="body">
            <ng-template ng-option-tmp let-item="item">
              {{ item.companyName || item.name }}
            </ng-template>
          </ng-select>
        </div>

        <div class="form-field">
          <label class="form-label" for="sessionId">Session</label>
          <ng-select
            id="sessionId"
            [items]="sessionList"
            bindLabel="sessionName"
            bindValue="id"
            [(ngModel)]="selectedSessionId"
            (ngModelChange)="onSelectionChange()"
            placeholder="Select Session"
            [clearable]="true"
            [searchable]="false"
            appendTo="body">
          </ng-select>
        </div>
      </div>

      <div *ngIf="loading" class="loading-box">
        Loading rate...
      </div>

      <div
        *ngIf="!loading && selectedCompanyId && selectedSessionId"
        class="single-rate-box"
      >
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">Rate (S$)</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="rateModel.rate"
            placeholder="Enter Rate"
          />
        </div>

        <div class="form-field">
          <label class="form-label">Effective From</label>
          <input
            type="date"
            class="form-control date-control"
            [(ngModel)]="rateModel.effectiveFrom"
          />
        </div>
      </div>
      </div>

      <div class="action-row" *ngIf="!loading && selectedCompanyId && selectedSessionId">
        <button type="button" class="btn btn-clear" (click)="clearRate()">
          Clear
        </button>

        <button
          type="button"
          class="btn btn-save"
          [disabled]="saving"
          (click)="saveRate()"
        >
          {{ saving ? 'Saving...' : 'Save Rate' }}
        </button>
      </div>
    </div>
  </div>
</div>
