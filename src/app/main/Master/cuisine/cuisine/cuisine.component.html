<div class="row">
  <div class="col-lg-6 col-md-3">
    <div class="card card-transaction">
      <div class="card-header d-flex justify-content-between align-items-center"
           style="background-color: #ffffff; padding: 12px 20px;">

        <h4 class="card-title" style="display: flex; align-items: center; gap: 10px; margin: 0; font-size: 1.25rem; font-weight: 600; color: #7367f0;">
          <span style="display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; background-color: #e5f0f3; border-radius: 50%;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7367f0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 style="width: 18px; height: 18px;">
              <path d="M3 21h18v-2H3v2zM5 17h14v-2H5v2zM7 13h10v-2H7v2zM9 9h6V7H9v2z"/>
            </svg>
          </span>
          Cuisine List
        </h4>

        <button (click)="createCuisine()"
                style="background-color:#7367f0; color:white; border:none; padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;">
          <i data-feather="plus-circle" style="width:14px; height:14px;"></i>
          Create
        </button>
      </div>

      <div class="card-body">
        <ul class="list-group">
          <li class="list-group-item d-flex justify-content-between align-items-center"
              *ngFor="let item of cuisineList">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center w-100">
              <div style="display: flex; align-items: center; gap: 8px; padding: 4px 10px;">
                <div class="avatar"
                     style="background-color: #7367f0; color: white; width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                  <i class="fas fa-box"></i>
                </div>
                <h6 style="margin: 0; font-weight: 600; font-size: 1rem; display: flex; align-items: center;">
                  {{ item.cuisineName }}
                </h6>
              </div>

              <div class="mt-md-0 mt-1 d-flex justify-content-md-end">
                <button type="button"
                        class="btn btn-outline-primary p-0 d-flex align-items-center justify-content-center"
                        style="width: 28px; height: 28px;"
                        (click)="editCuisine(item)">
                  <i data-feather="edit" style="width: 14px; height: 14px;"></i>
                </button>

                <button type="button"
                        class="btn btn-outline-danger p-0 d-flex align-items-center justify-content-center ml-1"
                        style="width: 28px; height: 28px;"
                        (click)="confirmdeleteCuisine(item)"
                        [disabled]="isEditMode">
                  <i data-feather="trash" style="width: 14px; height: 14px;"></i>
                </button>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="col-sm-12 col-xs-12 col-lg-6 col-md-6" *ngIf="isDisplay">
    <div class="card">
      <div class="card-header">
        <h4 class="card-title">{{ isEditMode ? 'Edit Cuisine' : 'Create Cuisine' }}</h4>
      </div>

      <div class="card-body">
        <form class="form" #addForm="ngForm">
          <div class="form-group">
            <label for="cuisine-name">Cuisine Name</label>
            <input type="text"
                   id="cuisine-name"
                   class="form-control"
                   placeholder="Cuisine Name"
                   name="cuisineName"
                   [(ngModel)]="cuisineName"
                   [maxlength]="100"
                   required />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea class="form-control"
                      id="description"
                      placeholder="Description"
                      name="description"
                      [(ngModel)]="description"
                      required></textarea>
          </div>

          <div class="row justify-content-start p-1">
            <button type="submit"
                    class="btn mr-1"
                    [disabled]="!addForm.form.valid"
                    (click)="onSubmit(addForm)"
                    style="background-color:#7367f0; color:white; padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;">
              <i data-feather="check-circle" style="width:14px; height:14px;"></i>
              Submit
            </button>

            <button type="button"
                    class="btn btn-danger mr-1"
                    (click)="cancel()"
                    style="padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;">
              <i data-feather="x-circle" style="width:14px; height:14px;"></i>
              Cancel
            </button>

            <button type="button"
                    class="btn btn-secondary"
                    (click)="reset()"
                    style="padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;">
              <i data-feather="rotate-ccw" style="width:14px; height:14px;"></i>
              Clear
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
