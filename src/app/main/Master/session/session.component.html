<div class="session-page container-fluid">
  <div class="row">
    <!-- LEFT : session LIST -->
    <div class="col-lg-6 col-md-12 mb-2">
      <div class="session-card list-card">
        <div class="card-header-custom">
          <div class="title-block">
            <div class="title-icon">
              <i data-feather="map-pin"></i>
            </div>
            <div>
              <h4 class="main-title">Session List</h4>
              <p class="sub-title">Manage your sessions here</p>
            </div>
          </div>

          <button type="button" class="btn-create" (click)="createsessions()">
            <i data-feather="plus"></i>
            Create
          </button>
        </div>

        <div class="card-body-custom">
          <div class="empty-state" *ngIf="!rows || rows.length === 0">
            <div class="empty-icon">
              <i data-feather="map"></i>
            </div>
            <h5>No sessions found</h5>
            <p>Click create button to add a new session.</p>
          </div>

          <div class="session-list" *ngIf="rows && rows.length > 0">
            <div class="session-item" *ngFor="let item of rows">
              <div class="item-left">
                <div class="item-avatar">
                  <i data-feather="globe"></i>
                </div>

                <div class="item-content">
                  <h5 class="session-name">{{ item.sessionName }}</h5>
                  <p class="session-desc">
                    {{ item.description || 'No description available' }}
                  </p>
                </div>
              </div>

              <div class="item-actions">
                <button
                  type="button"
                  class="icon-btn outline-btn outline-edit"
                  (click)="getsessionsDetails(item.id)"
                  title="Edit"
                >
                  <i data-feather="edit-2"></i>
                </button>

                <button
                  type="button"
                  class="icon-btn outline-btn outline-delete"
                  (click)="deletesessions(item.id)"
                  [disabled]="isEditMode"
                  title="Delete"
                >
                  <i data-feather="trash-2"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT : FORM -->
    <div class="col-lg-6 col-md-12 mb-2" *ngIf="isDisplay">
      <div class="session-card form-card">
        <div class="card-header-custom form-header">
          <div>
            <h4 class="main-title">{{ modeHeader }}</h4>
            <p class="sub-title">Enter session details below</p>
          </div>
        </div>

        <div class="card-body-custom">
          <form class="session-form" #addForm="ngForm" (ngSubmit)="Createsessions()">
            <div class="form-group-custom">
              <label for="sessionName">Session Name</label>
              <input
                type="text"
                id="sessionName"
                name="sessionName"
                class="form-control-custom"
                placeholder="Enter session name"
                [(ngModel)]="sessionName"
                maxlength="50"
                required
              />
            </div>

            <div class="form-group-custom">
              <label for="description">Description</label>
              <textarea
                id="description"
                name="description"
                class="form-control-custom textarea-control"
                placeholder="Enter description"
                [(ngModel)]="description"
                maxlength="50"
                rows="4"
                required
              ></textarea>
            </div>

            <div class="form-actions">
              <button
                type="submit"
                class="btn-submit"
                [disabled]="!addForm.valid"
              >
                <i data-feather="check"></i>
                Submit
              </button>

              <button
                type="button"
                class="btn-cancel"
                (click)="cancel()"
              >
                <i data-feather="x"></i>
                Cancel
              </button>

              <button
                type="button"
                class="btn-reset"
                *ngIf="resetButton"
                (click)="reset()"
              >
                <i data-feather="refresh-ccw"></i>
                Reset
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
