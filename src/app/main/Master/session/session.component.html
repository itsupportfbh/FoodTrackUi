<div class="row">
  <!-- LEFT : SESSION LIST -->
  <div class="col-lg-6 col-md-6">
    <div class="card card-transaction session-match-card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="card-title session-list-title"
                  style="display: flex; align-items: center; gap: 10px; margin: 0; font-size: 1.25rem; font-weight: 600; color: #6F3C2F;"
        >
          <span class="title-icon-wrap">
            <i data-feather="clock"></i>
          </span>
          Sessions with Serving Time
        </h4>

        <button
          type="button"
          class="create-btn"
          (click)="createsessions()"
        >
          <i data-feather="plus-circle"></i>
          Create
        </button>
      </div>

      <div class="card-body">
        <ul class="list-group" *ngIf="rows && rows.length > 0; else emptySession">
          <li
            class="list-group-item"
            *ngFor="let item of rows"
          >
            <div class="session-item-row">
              <div class="session-info-wrap">
                <div class="session-avatar">
                  <i data-feather="clock"></i>
                </div>

                <div class="session-content">
                  <h6 class="session-name">
                    {{ item.sessionName }}
                  </h6>

                  <p class="session-time">
                    {{ formatDisplayTime(item.fromTime) }} - {{ formatDisplayTime(item.toTime) }}
                  </p>
                </div>
              </div>

              <div class="session-action-wrap">
                <button
                  type="button"
                  class="btn btn-outline-primary action-btn edit-btn"
                  (click)="getsessionsDetails(item.id)"
                  title="Edit"
                >
                  <i data-feather="edit"></i>
                </button>

                <button
                  type="button"
                  class="btn btn-outline-danger action-btn delete-btn ml-1"
                  (click)="deletesessions(item.id)"
                  [disabled]="isEditMode"
                  title="Delete"
                >
                  <i data-feather="trash"></i>
                </button>
              </div>
            </div>
          </li>
        </ul>

        <ng-template #emptySession>
          <div class="text-center py-3 empty-state">
            <div class="empty-state-icon">
              <i data-feather="clock"></i>
            </div>
            <h6 class="mb-25">No sessions found</h6>
            <p class="text-muted mb-0">Click create button to add a new session.</p>
          </div>
        </ng-template>
      </div>
    </div>
  </div>

  <!-- RIGHT : FORM -->
  <div class="col-lg-6 col-md-6" *ngIf="isDisplay">
    <div class="card">
      <div class="card-header">
        <h4 class="card-title">{{ modeHeader }}</h4>
      </div>

      <div class="card-body">
        <form class="form" #addForm="ngForm" (ngSubmit)="Createsessions()">
          <div class="form-group">
            <label for="sessionName">Session Name</label>
            <input
              type="text"
              id="sessionName"
              class="form-control"
              placeholder="Session Name"
              name="sessionName"
              [(ngModel)]="sessionName"
              maxlength="50"
              required
            />
          </div>

          <div class="time-row">
            <div class="form-group-custom">
              <label for="fromTimeInput">From Time</label>

              <div class="time-input-wrapper" #fromWrapper>
                <input
                  id="fromTimeInput"
                  type="text"
                  name="fromTimeInput"
                  class="form-control-custom"
                  [value]="formatTime(fromTime)"
                  placeholder="Select from time"
                  readonly
                  (click)="toggleFromPicker($event)"
                />

                <button
                  type="button"
                  class="time-icon-btn"
                  (click)="toggleFromPicker($event)"
                  tabindex="-1"
                >
                  <i data-feather="clock"></i>
                </button>

                <div
                  class="time-popup"
                  *ngIf="showFromPicker"
                  (click)="onTimeAreaClick($event)"
                >
                  <ngb-timepicker
                    [(ngModel)]="fromTime"
                    name="fromTime"
                    [meridian]="true"
                    [spinners]="true"
                    [seconds]="false"
                  >
                  </ngb-timepicker>

                  <div class="time-popup-actions">
                    <button type="button" class="time-ok-btn" (click)="closePickers()">
                      OK
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-group-custom">
              <label for="toTimeInput">To Time</label>

              <div class="time-input-wrapper" #toWrapper>
                <input
                  id="toTimeInput"
                  type="text"
                  name="toTimeInput"
                  class="form-control-custom"
                  [value]="formatTime(toTime)"
                  placeholder="Select to time"
                  readonly
                  (click)="toggleToPicker($event)"
                />

                <button
                  type="button"
                  class="time-icon-btn"
                  (click)="toggleToPicker($event)"
                  tabindex="-1"
                >
                  <i data-feather="clock"></i>
                </button>

                <div
                  class="time-popup"
                  *ngIf="showToPicker"
                  (click)="onTimeAreaClick($event)"
                >
                  <ngb-timepicker
                    [(ngModel)]="toTime"
                    name="toTime"
                    [meridian]="true"
                    [spinners]="true"
                    [seconds]="false"
                  >
                  </ngb-timepicker>

                  <div class="time-popup-actions">
                    <button type="button" class="time-ok-btn" (click)="closePickers()">
                      OK
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="row justify-content-start p-1 form-action-row">
            <button
              type="submit"
              class="btn btn-primary mr-1"
              [disabled]="!addForm.valid"
            >
              <i data-feather="check-circle"></i>
              Submit
            </button>

            <button
              type="button"
              class="btn btn-danger mr-1"
              (click)="cancel()"
            >
              <i data-feather="x-circle"></i>
              Cancel
            </button>

            <button
              type="button"
              class="btn btn-secondary"
              *ngIf="resetButton"
              (click)="reset()"
            >
              <i data-feather="rotate-ccw"></i>
              Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
