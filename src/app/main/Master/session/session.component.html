<div class="row">
  <!-- LEFT : SESSION LIST -->
  <div class="col-lg-6 col-md-6">
    <div class="card card-transaction session-match-card">
      <div
        class="card-header d-flex justify-content-between align-items-center"
        style="background-color: #ffffff; padding: 12px 20px;"
      >
        <h4
          class="card-title"
          style="display: flex; align-items: center; gap: 10px; margin: 0; font-size: 1.25rem; font-weight: 600; color: #7367f0;"
        >
          <span
            style="display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; background-color: #e5f0f3; border-radius: 50%;"
          >
            <i
              data-feather="clock"
              style="width: 18px; height: 18px; color: #7367f0;"
            ></i>
          </span>
          Session List
        </h4>

        <button
          type="button"
          (click)="createsessions()"
          style="background-color:#7367f0; color:white; border:none; padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;"
        >
        <i data-feather="plus-circle" style="width:14px; height:14px;"></i>
          Create
        </button>
      </div>

      <div class="card-body">
        <ul class="list-group" *ngIf="rows && rows.length > 0; else emptySession">
          <li
            class="list-group-item d-flex justify-content-between align-items-center"
            *ngFor="let item of rows"
          >
            <div
              class="d-flex flex-column flex-md-row justify-content-between align-items-md-center w-100"
            >
              <div
                style="display: flex; align-items: center; gap: 8px; padding: 4px 10px;"
              >
                <div
                  class="avatar"
                  style="background-color: #7367f0; color: white; width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;"
                >
                  <i data-feather="clock" style="width: 16px; height: 16px;"></i>
                </div>

                <div>
                  <h6
                    style="margin: 0; font-weight: 600; font-size: 1rem; display: flex; align-items: center;"
                  >
                    {{ item.sessionName }}
                  </h6>
                 
                  <p class="session-time">
                    {{ formatDisplayTime(item.fromTime) }} - {{ formatDisplayTime(item.toTime) }}
                  </p>
                </div>
              </div>

              <div class="mt-md-0 mt-1 d-flex justify-content-md-end">
                <button
                  type="button"
                  class="btn btn-outline-primary p-0 d-flex align-items-center justify-content-center"
                  style="width: 28px; height: 28px;"
                  (click)="getsessionsDetails(item.id)"
                  title="Edit"
                >
                  <i data-feather="edit" style="width: 14px; height: 14px;"></i>
                </button>

                <button
                  type="button"
                  class="btn btn-outline-danger p-0 d-flex align-items-center justify-content-center ml-1"
                  style="width: 28px; height: 28px;"
                  (click)="deletesessions(item.id)"
                  [disabled]="isEditMode"
                  title="Delete"
                >
                  <i data-feather="trash" style="width: 14px; height: 14px;"></i>
                </button>
              </div>
            </div>
          </li>
        </ul>

        <ng-template #emptySession>
          <div class="text-center py-3">
            <div
              style="width: 52px; height: 52px; margin: 0 auto 10px; border-radius: 50%; background: #f3f2ff; display:flex; align-items:center; justify-content:center;"
            >
              <i data-feather="clock" style="width: 20px; height: 20px; color:#7367f0;"></i>
            </div>
            <h6 class="mb-25">No sessions found</h6>
            <p class="text-muted mb-0">Click create button to add a new session.</p>
          </div>
        </ng-template>
      </div>
    </div>
  </div>

  <!-- RIGHT : FORM -->
  <div class="col-lg-6 col-md-6" *ngIf="isDisplay">
    <div class="card">
      <div class="card-header">
        <h4 class="card-title">{{ modeHeader }}</h4>
      </div>

      <div class="card-body">
        <form class="form" #addForm="ngForm" (ngSubmit)="Createsessions()">
          <div class="form-group">
            <label for="sessionName">Session Name</label>
            <input
              type="text"
              id="sessionName"
              class="form-control"
              placeholder="Session Name"
              name="sessionName"
              [(ngModel)]="sessionName"
              maxlength="50"
              required
            />
          </div>

          
            <div class="time-row">
              <div class="form-group-custom">
                <label for="fromTimeInput">From Time</label>

                <div class="time-input-wrapper" #fromWrapper>
                  <input
                    id="fromTimeInput"
                    type="text"
                    name="fromTimeInput"
                    class="form-control-custom"
                    [value]="formatTime(fromTime)"
                    placeholder="Select from time"
                    readonly
                    (click)="toggleFromPicker($event)"
                  />

                  <button
                    type="button"
                    class="time-icon-btn"
                    (click)="toggleFromPicker($event)"
                    tabindex="-1"
                  >
                    <i data-feather="clock"></i>
                  </button>

                  <div
                    class="time-popup"
                    *ngIf="showFromPicker"
                    (click)="onTimeAreaClick($event)"
                  >
                    <ngb-timepicker
                      [(ngModel)]="fromTime"
                      name="fromTime"
                      [meridian]="true"
                      [spinners]="true"
                      [seconds]="false"
                    >
                    </ngb-timepicker>

                    <div class="time-popup-actions">
                      <button type="button" class="time-ok-btn" (click)="closePickers()">
                        OK
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="form-group-custom">
                <label for="toTimeInput">To Time</label>

                <div class="time-input-wrapper" #toWrapper>
                  <input
                    id="toTimeInput"
                    type="text"
                    name="toTimeInput"
                    class="form-control-custom"
                    [value]="formatTime(toTime)"
                    placeholder="Select to time"
                    readonly
                    (click)="toggleToPicker($event)"
                  />

                  <button
                    type="button"
                    class="time-icon-btn"
                    (click)="toggleToPicker($event)"
                    tabindex="-1"
                  >
                    <i data-feather="clock"></i>
                  </button>

                  <div
                    class="time-popup"
                    *ngIf="showToPicker"
                    (click)="onTimeAreaClick($event)"
                  >
                    <ngb-timepicker
                      [(ngModel)]="toTime"
                      name="toTime"
                      [meridian]="true"
                      [spinners]="true"
                      [seconds]="false"
                    >
                    </ngb-timepicker>

                    <div class="time-popup-actions">
                      <button type="button" class="time-ok-btn" (click)="closePickers()">
                        OK
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>






          <div class="row justify-content-start p-1">
            <button
              type="submit"
              class="btn mr-1"
              [disabled]="!addForm.valid"
              style="background-color:#7367f0; color:white; padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;"
            >
              <i data-feather="check-circle" style="width:14px; height:14px;"></i>
              Submit
            </button>

            <button
              type="button"
              class="btn btn-danger mr-1"
              (click)="cancel()"
              style="padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;"
            >
              <i data-feather="x-circle" style="width:14px; height:14px;"></i>
              Cancel
            </button>

            <button
              type="button"
              class="btn btn-secondary"
              *ngIf="resetButton"
              (click)="reset()"
              style="padding:6px 14px; font-size:0.9rem; border-radius:4px; display:flex; align-items:center; gap:6px;"
            >
              <i data-feather="rotate-ccw" style="width:14px; height:14px;"></i>
              Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
