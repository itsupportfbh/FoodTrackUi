<div class="row justify-content-center">
  <div class="col-lg-7 col-md-10 col-12">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="card-title mb-0">
          {{ isEditMode ? 'Update Site Settings' : 'Create Site Settings' }}
        </h4>

        <span
          class="badge badge-light-primary"
          *ngIf="selectedSiteSetting?.updatedDate || selectedSiteSetting?.createdDate || selectedSiteSetting?.UpdatedDate || selectedSiteSetting?.CreatedDate"
        >
          Last Updated :
          {{
            (selectedSiteSetting?.updatedDate ||
             selectedSiteSetting?.createdDate ||
             selectedSiteSetting?.UpdatedDate ||
             selectedSiteSetting?.CreatedDate) | date:'dd/MM/yyyy hh:mm a'
          }}
        </span>
      </div>

      <div class="card-body">
        <form #siteForm="ngForm" (ngSubmit)="onSubmit(siteForm)">
          <div style="display: none;" class="form-group">
            <label for="breakfastCutOffTime">Breakfast Cut Off Time</label>
            <input
              type="text"
              id="breakfastCutOffTime"
              name="breakfastCutOffTime"
              class="form-control"
              [(ngModel)]="breakfastCutOffTime"
              placeholder="Enter breakfast cut off time"
              required
            />
          </div>

          <div style="display: none;" class="form-group">
            <label for="lunchCutOffTime">Lunch Cut Off Time</label>
            <input
              type="text"
              id="lunchCutOffTime"
              name="lunchCutOffTime"
              class="form-control"
              [(ngModel)]="lunchCutOffTime"
              placeholder="Enter lunch cut off time"
              required
            />
          </div>

          <div style="display: none;" class="form-group">
            <label for="lateLunchCutOffTime">Late Lunch Cut Off Time</label>
            <input
              type="text"
              id="lateLunchCutOffTime"
              name="lateLunchCutOffTime"
              class="form-control"
              [(ngModel)]="lateLunchCutOffTime"
              placeholder="Enter late lunch cut off time"
              required
            />
          </div>

          <div style="display: none;" class="form-group">
            <label for="dinnerCutOffTime">Dinner Cut Off Time</label>
            <input
              type="text"
              id="dinnerCutOffTime"
              name="dinnerCutOffTime"
              class="form-control"
              [(ngModel)]="dinnerCutOffTime"
              placeholder="Enter dinner cut off time"
              required
            />
          </div>

          <div  style="display: none;" class="form-group">
            <label for="lateDinnerCutOffTime">Late Dinner Cut Off Time</label>
            <input
              type="text"
              id="lateDinnerCutOffTime"
              name="lateDinnerCutOffTime"
              class="form-control"
              [(ngModel)]="lateDinnerCutOffTime"
              placeholder="Enter late dinner cut off time"
              required
            />
          </div>

          <div class="form-group">
            <label for="orderDate">Order Start Date </label>
            <small class="text-muted"> Minimum 3 days advance required</small>
            <input
              type="text"
              id="orderDate"
              name="orderDate"
              class="form-control"
              [(ngModel)]="orderDate"
              placeholder="Enter order start date"
              required
            />
          </div>

          <div class="d-flex flex-wrap" style="gap: 12px;">
            <button
              type="submit"
              class="btn-submit"
              [disabled]="!siteForm.form.valid"
                          >
              <i data-feather="check-circle" style="width:14px; height:14px;"></i>
              Submit
            </button>

            <button
              type="button"
              class="btn-cancel"
              (click)="cancel()"
              
            >
              <i data-feather="x-circle" style="width:14px; height:14px;"></i>
              Cancel
            </button>

            <button
              type="button"
              class="btn-clear"
              (click)="clearFields()"
              >
              <i data-feather="rotate-ccw" style="width:14px; height:14px;"></i>
              Clear
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
