<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-md-12 col-12">

      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h4 class="mb-0">QR Code Generator</h4>
          <span class="badge badge-light-success">
            {{ qrRequest.isActive ? 'Active' : 'Inactive' }}
          </span>
        </div>

        <div class="card-body">

          <!-- 🔹 FORM -->
          <div class="row">

            <!-- Request -->
            <div class="col-md-4">
              <label>Request ID</label>
              <select
  class="form-control"
  name="requestId"
  [(ngModel)]="qrRequest.requestId"
  (change)="onRequestChange()"
  
>
    <option [ngValue]="''" disabled selected>Select Request</option>


  <option *ngFor="let item of requestList" [ngValue]="item.requestId">
  {{ item.displayText || (item.requestNo + ' - ' + item.companyName) }}
</option>
</select>
            </div>

            <!-- Company ID -->
            <div class="col-md-4">
              <label>Company ID</label>
              <input type="number"
                     name="companyId"
                     class="form-control"
                     [(ngModel)]="qrRequest.companyId"
                     placeholder="Enter Company ID">
            </div>

            <!-- Company Name -->
            <div class="col-md-4">
              <label>Company Name</label>
              <input type="text"
                     name="companyName"
                     class="form-control"
                     [(ngModel)]="qrRequest.companyName"
                     placeholder="Enter Company Name">
            </div>
              <!-- Company Email -->
            <div class="col-md-4">
              <label>Company Email</label>
              <input type="email"
       name="Email"
       class="form-control"
       [(ngModel)]="qrRequest.companyEmail"
       placeholder="Enter Company Email">
            </div>

            <!-- Valid From -->
            <div class="col-md-4 mt-2">
              <label>QR Valid From</label>
              <input type="text"

                     name="qrValidFrom"
                     class="form-control"
                     [(ngModel)]="qrRequest.qrValidFrom">
            </div>

            <!-- Valid Till -->
            <div class="col-md-4 mt-2">
              <label>QR Valid Till</label>
              <input type="text"

                     name="qrValidTill"
                     class="form-control"
                     [(ngModel)]="qrRequest.qrValidTill">
            </div>

            <!-- No of QR -->
            <div class="col-md-4 mt-2">
              <label>No of QR Codes</label>
              <input type="number"
                     name="noofQR"
                     class="form-control"
                     [(ngModel)]="qrRequest.TotalQty"
                     placeholder="Enter number of QR">
            </div>

        />

        <p class="mt-2"><strong>QR Data:</strong></p>

        <div class="mt-3 d-flex justify-content-center gap-2">
          <a
            [href]="backendQrImage"
            download="qr.png"

          >
            Download QR
          </a>

          <button
            type="button"

          >

  </div>
  -->
</div>

          <!-- 🔹 BUTTONS -->
          <div class="d-flex mt-3 flex-wrap" style="gap: 10px;">
            <button class="btn btn-primary" (click)="generateQrCodes()">
              <i data-feather="cpu" class="mr-50"></i>

              Generate QR
            </button>
<!--
           <button type="button" class="btn btn-success" (click)="onSubmit()">
  Save
</button>   -->

            <button class="btn btn-secondary" (click)="clearForm()">
                  <i data-feather="x-circle" class="mr-50"></i>

              Clear
            </button>
             <button
            type="button"
            class="btn btn-primary btn-sm"
            (click)="sendEmail()"
              [disabled]="!generatedQrList || generatedQrList.length === 0"

          >
              <i data-feather="mail" class="mr-50"></i>

            Send Email
          </button>
           <button
  type="button"
  class="btn btn-success btn-sm"
  (click)="downloadAllQrs()"
  [disabled]="!generatedQrList?.length"
>
    <i data-feather="download" class="mr-50"></i>

  Download All QR
</button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- 🔹 FRONTEND QR LIST -->
  <div class="row mt-3" *ngIf="generatedQrList && generatedQrList.length > 0">
    <div class="col-12">
      <div class="card">

        <div class="card-header">
          <h4 class="mb-0">Generated QR Preview</h4>
        </div>

        <div class="card-body">
          <div class="row">

            <div class="col-lg-4 col-md-6 mb-3"
                 *ngFor="let item of generatedQrList">

              <div class="border rounded p-3 text-center h-100 shadow-sm">
                <h6 class="mb-2">QR {{ item.qrNo }}</h6>

                <qrcode
                  [qrdata]="item.qrText"
                  [width]="180"
                  [errorCorrectionLevel]="'M'">
                </qrcode>

                <div class="text-left mt-2 small">
                <!-- <p><b>SerialNo:</b> {{ item.serialNo }}</p>  --> 
                  <p><b>UniqueCode:</b> {{ item.uniqueCode }}</p>
                  <p><b>IsUsed:</b> {{ item.isUsed }}</p>
                                 
                </div>
              </div>

            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

</div>
