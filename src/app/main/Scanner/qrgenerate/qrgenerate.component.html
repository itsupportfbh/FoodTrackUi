<div class="container-fluid qr-generator-page">
  <div class="qr-page-shell">
    <div class="card qr-generator-card">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap">
        <h4 class="mb-0 qr-generator-title">QR Code Generator</h4>
      </div>

      <div class="card-body qr-card-body">
        <div class="qr-form-panel" [class.qr-processing]="isProcessing">
          <div class="qr-loader-overlay" *ngIf="isProcessing">
            <div class="bank-loader">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <fieldset class="qr-form-fieldset" [disabled]="isProcessing">
            <div class="row qr-form-row">
              <div class="col-lg-4 col-md-6 col-12">
                <label class="qr-label">Request / Pending Segment</label>
              <select
  class="form-control qr-input"
  name="requestSelection"
  [(ngModel)]="selectedRequestItem"
  (ngModelChange)="onRequestChange()"
>
  <option [ngValue]="null">Select Request</option>
  <option *ngFor="let item of requestList" [ngValue]="item">
    {{ item.displayText }}
  </option>
</select>
              </div>

              <div class="col-lg-4 col-md-6 col-12">
                <label class="qr-label">Company Email</label>
                <input
                  type="email"
                  name="Email"
                  class="form-control qr-input"
                  [(ngModel)]="qrRequest.companyEmail"
                  placeholder="Enter Company Email"
                  readonly
                >
              </div>

              <div class="col-lg-4 col-md-6 col-12">
                <label class="qr-label">Pending QR Qty</label>
                <input
                  type="number"
                  name="noofQR"
                  class="form-control qr-input"
                  [(ngModel)]="qrRequest.TotalQty"
                  placeholder="Enter number of QR"
                  readonly
                >
              </div>

              <div class="col-lg-4 col-md-6 col-12">
                <label class="qr-label">QR Valid From</label>
                <input
                  type="text"
                  name="qrValidFrom"
                  class="form-control qr-input"
                  [ngModel]="qrRequest.qrValidFrom | date:'dd-MM-yyyy'"
                  placeholder="dd-mm-yyyy"
                  readonly
                >
              </div>

              <div class="col-lg-4 col-md-6 col-12">
                <label class="qr-label">QR Valid Till</label>
                <input
                  type="text"
                  name="qrValidTill"
                  class="form-control qr-input"
                  [ngModel]="qrRequest.qrValidTill | date:'dd-MM-yyyy'"
                  placeholder="dd-mm-yyyy"
                  readonly
                >
              </div>

              <div class="col-lg-4 col-md-6 col-12">
                <label class="qr-label">Source Type</label>
                <input
                  type="text"
                  class="form-control qr-input"
                  [ngModel]="selectedRequestItem?.sourceType || ''"
                  readonly
                >
              </div>
            </div>

            <div class="qr-btn-group">
              <button
                type="button"
                class="btn btn-primary qr-action-btn"
                (click)="generateQrCodes()"
                [disabled]="isProcessing || !selectedRequestItem"
              >
                <span *ngIf="!isProcessing">
                  <i data-feather="cpu" class="mr-50"></i>
                  <span>Generate QR</span>
                </span>

                <span *ngIf="isProcessing">Processing...</span>
              </button>
            </div>
          </fieldset>
        </div>
      </div>
    </div>
  </div>
</div>
