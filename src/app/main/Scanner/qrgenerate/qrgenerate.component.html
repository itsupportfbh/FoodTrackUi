<div class="card-body position-relative">

  <div class="qr-loader-overlay" *ngIf="isProcessing">
    <div class="qr-loader-box text-center">
      <div class="spinner-border text-primary qr-loader-spinner" role="status">
        <span class="sr-only">Loading...</span>
      </div>
      <div class="mt-1 qr-loader-text">QR generation is in process...</div>
      <small class="text-muted">Please wait. QR is generating, saving and sending email.</small>
    </div>
  </div>

  <div class="row qr-form-row">
    <div class="col-lg-4 col-md-6 col-12">
      <label class="qr-label">Request No</label>
      <select
        class="form-control qr-input"
        name="requestId"
        [(ngModel)]="qrRequest.requestId"
        (change)="onRequestChange()"
        [disabled]="isProcessing"
      >
        <option [ngValue]="null" disabled selected>Select Request</option>
        <option *ngFor="let item of requestList" [ngValue]="item.requestId">
          {{ item.displayText || (item.requestNo + ' - ' + item.companyName) }}
        </option>
      </select>
    </div>

    <div class="col-lg-4 col-md-6 col-12">
      <label class="qr-label">Company Email</label>
      <input
        type="email"
        name="Email"
        class="form-control qr-input"
        [(ngModel)]="qrRequest.companyEmail"
        placeholder="Enter Company Email"
        readonly
      >
    </div>

    <div class="col-lg-4 col-md-6 col-12">
      <label class="qr-label">No of QR Codes</label>
      <input
        type="number"
        name="noofQR"
        class="form-control qr-input"
        [(ngModel)]="qrRequest.TotalQty"
        placeholder="Enter number of QR"
        readonly
      >
    </div>

    <div class="col-lg-4 col-md-6 col-12">
      <label class="qr-label">QR Valid From</label>
      <input
        type="text"
        name="qrValidFrom"
        class="form-control qr-input"
        [ngModel]="qrRequest.qrValidFrom | date:'dd-MM-yyyy'"
        placeholder="dd-mm-yyyy"
        readonly
      >
    </div>

    <div class="col-lg-4 col-md-6 col-12">
      <label class="qr-label">QR Valid Till</label>
      <input
        type="text"
        name="qrValidTill"
        class="form-control qr-input"
        [ngModel]="qrRequest.qrValidTill | date:'dd-MM-yyyy'"
        placeholder="dd-mm-yyyy"
        readonly
      >
    </div>
  </div>

  <div class="qr-btn-group">
    <button
      class="btn btn-primary qr-action-btn"
      (click)="generateQrCodes()"
      [disabled]="isProcessing"
    >
      <span *ngIf="!isProcessing">
        <i data-feather="cpu" class="mr-50"></i>
        <span>Generate QR</span>
      </span>

      <span *ngIf="isProcessing" class="d-inline-flex align-items-center">
        <span class="spinner-border spinner-border-sm mr-50" role="status"></span>
        Processing...
      </span>
    </button>
  </div>

</div>
