<div class="scanner-page">
  <div class="scanner-card">
    <div class="scanner-header">
      <h2>QR Scanner</h2>
      <p>Front / Back camera scanner for customer QR code</p>
    </div>

    <div class="scanner-body">
      <div id="qr-reader" class="qr-reader-box"></div>

      <div
        class="status-box"
        [ngClass]="{
          'status-success': scanStatus === 'success',
          'status-error': scanStatus === 'error',
          'status-permission': scanStatus === 'permission'
        }"
      >
        {{ statusMessage }}
      </div>
      
<!-- 
      <div class="result-box" *ngIf="scannedText">
        <label>Scanned QR Text</label>
        <div class="result-value">{{ scannedText }}</div>
      </div> -->

      <div class="action-row">
        <button type="button" class="btn btn-primary btn-sm" (click)="restartScanner()">
          Restart Scanner
        </button>
      </div>
    </div>
  </div>
</div>
