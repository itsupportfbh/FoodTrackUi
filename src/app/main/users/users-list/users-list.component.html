<div class="content-wrapper container-xxl p-0">
  <div class="content-body">
    <section class="users-list-wrapper">
      <div class="card">
          <div class="card-header border-bottom">
          <h4 class="card-title mb-0"
           style="margin-left:0.85rem;margin-top:0.75rem;font-size:1.25rem;font-weight:600;color:#6F3C2F;"
          >User List</h4>
        </div>
        <div class="row">
          <div class="col-md-6 col-12">
            <div class="d-flex justify-content-between align-items-center m-1">
              <label class="d-flex align-items-center">
                Show
                <select class="form-control mx-25" [(ngModel)]="selectedOption">
                  <option [ngValue]="10">10</option>
                  <option [ngValue]="25">25</option>
                  <option [ngValue]="50">50</option>
                  <option [ngValue]="100">100</option>
                </select>
                entries
              </label>
            </div>
          </div>

          <div class="col-md-6 col-12 d-flex justify-content-start justify-content-md-end">
            <div class="d-flex align-items-center justify-content-end pr-1 pb-1 pb-md-0">
              <label class="d-flex align-items-center ml-1 ml-md-0">
                Search:
                <input
                  [(ngModel)]="searchValue"
                  name="searchValue"
                  type="search"
                  class="form-control ml-25"
                  (keyup)="filterUpdate($event)"
                  (search)="filterUpdate($event)"
                />
              </label>

              <button
                class="btn btn-primary ml-1"
                rippleEffect
                type="button"
                (click)="openCreateSidebar()"
              >
                <i data-feather="plus" class="d-sm-none d-inline-block mr-0 mr-sm-1"></i>
                <span class="d-none d-sm-inline-block">Add New User</span>
              </button>
            </div>
          </div>
        </div>

        <ngx-datatable
          #table
          [rows]="rows"
          [rowHeight]="50"
          class="bootstrap core-bootstrap"
          [limit]="selectedOption"
          [columnMode]="ColumnMode.force"
          [headerHeight]="50"
          [footerHeight]="50"
          [scrollbarH]="true"
        >
          <ngx-datatable-column name="User" prop="fullName" [width]="250">
            <ng-template let-row="row" let-name="value" ngx-datatable-cell-template>
              <div class="d-flex align-items-center">
                <div *ngIf="row.avatar && row.avatar.length > 0; else customAvatar">
                  <img
                    class="rounded-circle mr-1"
                    [src]="row.avatar"
                    height="32"
                    width="32"
                    alt="datatable-avatar"
                  />
                </div>

                <ng-template #customAvatar>
                  <div
                    class="avatar mr-1 ml-0"
                    [ngClass]="{
                      'bg-light-success': row.status == 'active',
                      'bg-light-secondary': row.status == 'inactive'
                    }"
                  >
                    <div class="avatar-content">
                      {{ getInitials(name) }}
                    </div>
                  </div>
                </ng-template>

                <div class="cell-line-height">
                  <a href="javascript:void(0)" class="font-medium-1 d-block">
                    <span class="font-weight-bold">{{ name }}</span>
                  </a>
                  <span class="text-muted font-small-2">@{{ row.username }}</span>
                </div>
              </div>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-column name="Email" prop="email" [width]="250"></ngx-datatable-column>

          <ngx-datatable-column name="Company" prop="companyName" [width]="180">
            <ng-template let-company="value" ngx-datatable-cell-template>
              <div>
                <i class="feather icon-building text-primary mr-50"></i>
                {{ company }}
              </div>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-column name="Role" prop="roleName" [width]="140"></ngx-datatable-column>

          <ngx-datatable-column name="Status" prop="status" [width]="120">
            <ng-template let-status="value" ngx-datatable-cell-template>
              <div
                class="badge badge-pill"
                [ngClass]="{
                  'badge-light-success': status == 'active',
                  'badge-light-secondary': status == 'inactive'
                }"
              >
                {{ status }}
              </div>
            </ng-template>
          </ngx-datatable-column>

          <ngx-datatable-column name="Actions" [width]="120" [sortable]="false">
            <ng-template ngx-datatable-cell-template let-row="row">
              <div class="d-flex align-items-center action-btn-group">
                <button
                  type="button"
                  class="btn btn-icon btn-outline-primary btn-sm mr-50"
                  rippleEffect
                  (click)="editUser(row)"
                  title="Edit"
                >
                  <i class="feather icon-edit"></i>
                </button>

                <button
                  type="button"
                  class="btn btn-icon btn-outline-danger btn-sm"
                  rippleEffect
                  (click)="deleteUser(row)"
                  title="Delete"
                >
                  <i class="feather icon-trash-2"></i>
                </button>
              </div>
            </ng-template>
          </ngx-datatable-column>
        </ngx-datatable>
      </div>
    </section>
  </div>

  <core-sidebar
    class="modal modal-slide-in sidebar-todo-modal fade"
    name="new-user-sidebar"
    overlayClass="modal-backdrop"
  >
    <app-create-users
      [editUserId]="selectedUserId"
      (userSaved)="onUserSaved()"
    ></app-create-users>
  </core-sidebar>
</div>
