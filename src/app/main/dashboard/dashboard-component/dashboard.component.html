<div class="dashboard-page">
  <div class="dashboard-filter-card">
    <div class="filter-grid">
      <div class="filter-item company-filter">
        <label>Company</label>
        <ng-select
          [items]="companyList"
          bindLabel="companyName"
          bindValue="id"
          placeholder="All Companies"
          [(ngModel)]="filters.companyIds"
          [multiple]="true"
          [closeOnSelect]="false"
          [hideSelected]="true"
          [searchable]="true"
          [clearable]="true"
          appendTo="body"
          (change)="onFilterChange()"
          (clear)="onFilterChange()">
        </ng-select>
      </div>

      <div class="filter-item">
        <label>From Date</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="filters.fromDate"
          (change)="onFilterChange()"
        />
      </div>

      <div class="filter-item">
        <label>To Date</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="filters.toDate"
          (change)="onFilterChange()"
        />
      </div>

      <div class="filter-actions-inline">
        <button
          type="button"
          class="icon-btn apply-icon"
          title="Search"
          (click)="loadDashboard()">
          <i data-feather="search"></i>
        </button>

        <button
          type="button"
          class="icon-btn reset-icon"
          title="Reset"
          (click)="resetFilters()">
          <i data-feather="rotate-ccw"></i>
        </button>
      </div>
    </div>

    <div class="filter-footer" *ngIf="dashboardData?.isOverrideApplied">
      <div class="override-badge">
        <i data-feather="refresh-cw"></i>
        <span>Override Applied</span>
      </div>
    </div>
  </div>

  <div class="dashboard-row">
    <app-total-company-summary [dashboardData]="dashboardData"></app-total-company-summary>
  </div>

  <div class="dashboard-row">
    <app-session-demand [dashboardData]="dashboardData"></app-session-demand>
  </div>

  <div class="dashboard-row">
    <app-price-overview [filters]="filters" [dashboardData]="dashboardData"></app-price-overview>
  </div>

  <div class="dashboard-row">
    <app-top-companies [dashboardData]="dashboardData"></app-top-companies>
  </div>

  <div class="dashboard-row">
    <app-recent-scanner-activity [dashboardData]="dashboardData"></app-recent-scanner-activity>
  </div>
</div>
