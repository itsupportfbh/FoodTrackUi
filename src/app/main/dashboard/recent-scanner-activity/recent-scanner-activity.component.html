<div class="scanner-activity-card">
  <div class="scanner-header">
    <div class="scanner-header-left">
      <div class="scanner-icon-wrap">
        <i data-feather="activity"></i>
      </div>

      <div>
        <h3>Recent Scanner Activity</h3>
        <p>Latest important redemption logs</p>
      </div>
    </div>

    <button type="button" class="invalid-btn">
      <i data-feather="alert-circle"></i>
      <span>Invalid Scans</span>
    </button>
  </div>

  <div class="scanner-list">
    <div class="scanner-item" *ngFor="let item of scannerActivities">
      <div class="scanner-main">
        <div
          class="scanner-avatar"
          [ngClass]="{
            'avatar-redeemed': item.status === 'Redeemed',
            'avatar-invalid': item.status === 'Invalid'
          }"
        >
          <i
            [attr.data-feather]="item.status === 'Redeemed' ? 'check-circle' : 'x-circle'"
          ></i>
        </div>

        <div class="scanner-content">
          <div class="scanner-title-row">
            <h4>{{ item.qrNo }}</h4>
            <span class="dot"></span>
            <h5>{{ item.companyName }}</h5>
          </div>

          <div class="scanner-meta">
            <span class="meta-chip">{{ item.session }}</span>
            <span class="meta-time">{{ item.time }}</span>
          </div>
        </div>
      </div>

      <div
        class="scanner-status"
        [ngClass]="{
          'status-redeemed': item.status === 'Redeemed',
          'status-invalid': item.status === 'Invalid'
        }"
      >
        {{ item.status }}
      </div>
    </div>
  </div>
</div>
