<div class="request-page">
  <div class="request-card">
    <div class="request-header">
      <div class="header-left">
        <button type="button" class="btn-back" (click)="goBack()">
          <i data-feather="arrow-left"></i>
        </button>

        <div>
          <h2 class="title">
            {{ isEditMode ? 'Edit Order' : 'Create Order' }}
          </h2>
          
        </div>
      </div>
    </div>

    <div class="request-body">
      <div class="header-grid header-grid-no-requestno">
        <div class="form-group">
          <label>Company <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control-custom"
            [ngModel]="model.companyName"
            name="companyName"
            readonly
          />
        </div>

        <div class="form-group">
          <label>From Date <span class="text-danger">*</span></label>
          <input
            type="date"
            class="form-control-custom"
            [(ngModel)]="model.fromDate"
            name="fromDate"
          />
        </div>

        <div class="form-group">
          <label>To Date <span class="text-danger">*</span></label>
          <input
            type="date"
            class="form-control-custom"
            [(ngModel)]="model.toDate"
            name="toDate"
          />
        </div>

        <div class="form-group">
          <label>Total Qty</label>
          <input
            type="number"
            class="form-control-custom"
            [(ngModel)]="model.totalQty"
            name="totalQty"
            readonly
          />
        </div>
      </div>

      <div class="accordion-wrapper">
        <div class="session-accordion" *ngFor="let group of sessionGroups; let gi = index">
          <button
            type="button"
            class="accordion-header"
            (click)="toggleAccordion(group)"
          >
            <div class="accordion-title-wrap">
              <span class="accordion-title">{{ group.sessionName }}</span>
              <span class="accordion-count">{{ group.lines?.length || 0 }} cuisines</span>
            </div>

            <span class="accordion-icon" [class.open]="group.isOpen">
              <i data-feather="chevron-down"></i>
            </span>
          </button>

          <div class="accordion-body" *ngIf="group.isOpen">
            <div class="table-wrap">
              <table class="line-table">
                <thead>
                  <tr>
                    <th>Cuisine</th>
                    <th>Location</th>
                    <th>Qty</th>
                  </tr>
                </thead>

                <tbody>
                  <tr *ngFor="let line of group.lines; let li = index">
                    <td>
                      <input
                        type="text"
                        class="form-control-custom table-control readonly-input"
                        [ngModel]="line.cuisineName"
                        [name]="'cuisineName_' + gi + '_' + li"
                        readonly
                      />
                    </td>

                    <td>
                      <ng-select
                        class="table-ng-select"
                        [items]="locations"
                        bindLabel="name"
                        [(ngModel)]="line.locationObj"
                        [name]="'locationId_' + gi + '_' + li"
                        (change)="onLocationChange(line)"
                        [clearable]="true"
                        [searchable]="true"
                        appendTo="body"
                        [placeholder]="line.locationObj ? '' : 'Select Location'">
                      </ng-select>
                    </td>

                    <td>
                      <input
                        type="number"
                        min="0"
                        class="form-control-custom table-control"
                        [(ngModel)]="line.qty"
                        [name]="'qty_' + gi + '_' + li"
                        (input)="onLineChange()"
                        placeholder="Enter qty"
                      />
                    </td>
                  </tr>

                  <tr *ngIf="!group.lines || group.lines.length === 0">
                    <td colspan="3" class="empty-row">No cuisines available</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-reset" (click)="goBack()">
          Cancel
        </button>

        <button type="button" class="btn-save" (click)="saveRequest()">
          {{ isEditMode ? 'Update Request' : 'Save Request' }}
        </button>
      </div>
    </div>
  </div>
</div>
