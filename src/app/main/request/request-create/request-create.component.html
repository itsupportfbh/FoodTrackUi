<div class="request-list-page">
  <div class="card request-list-card request-create-card">
    <div class="card-header d-flex justify-content-between align-items-center flex-wrap">
      <div class="d-flex align-items-center create-header-left">
        <button type="button" class="btn btn-outline-primary back-btn mr-1" (click)="goBack()">
          <i data-feather="arrow-left"></i>
        </button>

        <h4 class="card-title mb-0">
          {{ isEditMode ? 'Edit Order' : 'Create Order' }}
        </h4>
      </div>
    </div>

    <div class="card-body request-create-body">
      <div class="create-form-grid">
        <div class="form-group">
          <label>Company <span class="text-danger">*</span></label>
          <input
            type="text"
            class="form-control form-control-sm create-input"
            [ngModel]="model.companyName"
            name="companyName"
            readonly
          />
        </div>

        <div class="form-group">
          <label>From Date <span class="text-danger">*</span></label>
          <input
            type="date"
            class="form-control form-control-sm create-input"
            [(ngModel)]="model.fromDate"
            name="fromDate"
            [min]="minDate"
            (change)="onFromDateChange()"
          />
           <small class="text-muted">
  Minimum {{ orderDays }} days advance required
</small>
        </div>

        <div class="form-group">
          <label>To Date <span class="text-danger">*</span></label>
          <input
            type="date"
            class="form-control form-control-sm create-input"
            [(ngModel)]="model.toDate"
            name="toDate"
            [min]="model.fromDate || minDate"
            [max]="toDateMax"
          />
        </div>

        <div class="form-group">
          <label>Total Qty</label>
          <input
            type="number"
            class="form-control form-control-sm create-input"
            [(ngModel)]="model.totalQty"
            name="totalQty"
            readonly
          />
        </div>
      </div>

      <div class="accordion-wrapper">
        <div class="session-accordion" *ngFor="let group of sessionGroups; let gi = index">
          <button
            type="button"
            class="accordion-header"
            (click)="toggleAccordion(group)"
          >
            <div class="accordion-title-wrap">
              <span class="accordion-title">{{ group.sessionName }}</span>
              <span class="accordion-count">{{ group.lines?.length || 0 }} cuisines</span>
            </div>

            <span class="accordion-icon" [class.open]="group.isOpen">
              <i data-feather="chevron-down"></i>
            </span>
          </button>

          <div class="accordion-body" *ngIf="group.isOpen">
            <div class="table-responsive create-table-wrap">
              <table class="table create-line-table mb-0">
                <thead>
                  <tr>
                    <th class="cuisine-col">Cuisine</th>
                    <th class="location-col">Location</th>
                    <th class="qty-col">Qty</th>
                  </tr>
                </thead>

                <tbody>
                  <ng-container *ngFor="let line of group.lines; let li = index">
                    <ng-container *ngFor="let detail of line.details; let di = index">
                      <tr>
                        <td>
                          <div class="cuisine-cell">
                            <input
                              type="text"
                              class="form-control form-control-sm create-input readonly-input"
                              [ngModel]="line.cuisineName"
                              [name]="'cuisineName_' + gi + '_' + li + '_' + di"
                              readonly
                            />

                            <button
                              *ngIf="di === 0"
                              type="button"
                              class="btn btn-sm btn-outline-primary add-location-btn"
                              (click)="addLocationRow(line)"
                            >
                              + Add
                            </button>
                          </div>
                        </td>

                        <td>
                          <ng-select
                            class="table-ng-select"
                            [items]="locations"
                            bindLabel="name"
                            [(ngModel)]="detail.locationObj"
                            [name]="'locationId_' + gi + '_' + li + '_' + di"
                            (change)="onDetailLocationChange(detail)"
                            [clearable]="true"
                            [searchable]="true"
                            appendTo="body"
                            [placeholder]="detail.locationObj ? '' : 'Select Location'">
                          </ng-select>
                        </td>

                        <td>
                          <div class="qty-cell">
                            <input
                              type="number"
                              min="0"
                              class="form-control form-control-sm create-input"
                              [(ngModel)]="detail.qty"
                              [name]="'qty_' + gi + '_' + li + '_' + di"
                              (input)="onLineChange()"
                              placeholder="Enter qty"
                            />

                            <button
                              *ngIf="line.details.length > 1"
                              type="button"
                              class="btn btn-sm btn-outline-danger remove-location-btn"
                              (click)="removeLocationRow(line, di)"
                            >
                              <i data-feather="trash-2"></i>
                            </button>
                          </div>
                        </td>
                      </tr>
                    </ng-container>
                  </ng-container>

                  <tr *ngIf="!group.lines || group.lines.length === 0">
                    <td colspan="3" class="text-center text-muted py-2">No cuisines available</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="goBack()">
          Cancel
        </button>

        <button type="button" class="btn btn-primary btn-sm" (click)="saveRequest()">
          {{ isEditMode ? 'Update' : 'Save' }}
        </button>
      </div>
    </div>
  </div>
</div>
