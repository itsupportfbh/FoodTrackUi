<div class="request-list-page">
  <div class="content-wrapper container-xxl p-0">
    <div class="content-body">
      <section class="users-list-wrapper">
        <div class="card request-list-card">
          <h4 class="request-page-title">
            Order List
          </h4>

          <div class="row request-toolbar-row align-items-center">
            <div class="col-md-6 col-12">
              <div class="d-flex align-items-center m-1 left-tools-wrap">
                <label class="d-flex align-items-center mb-0 text-muted">
                  Show
                  <select
                    class="form-control mx-25 entries-select"
                    [(ngModel)]="selectedOption"
                    (change)="onPageSizeChange()"
                    name="selectedOption"
                  >
                    <option [ngValue]="10">10</option>
                    <option [ngValue]="25">25</option>
                    <option [ngValue]="50">50</option>
                    <option [ngValue]="100">100</option>
                  </select>
                  entries
                </label>
              </div>
            </div>

            <!-- <div class="col-md-6 col-12">
              <div class="toolbar-right">
                <label class="d-flex align-items-center mb-0 text-muted search-label">
                  <span class="mr-50">Search:</span>
                  <input
                    [(ngModel)]="searchText"
                    name="searchText"
                    type="search"
                    class="form-control search-input"
                    (input)="filterRequests()"
                  />
                </label>

                <button
                  *ngIf="canManageOrders"
                  type="button"
                  class="btn btn-primary add-btn"
                  (click)="openCreate()"
                >
                  <i data-feather="plus" class="d-sm-none d-inline-block mr-0 mr-sm-1"></i>
                  <span class="d-none d-sm-inline-block">Add</span>
                </button>
              </div>
            </div> -->

             <div class="col-md-6 col-12 d-flex justify-content-start justify-content-md-end">
                <div class="d-flex align-items-center justify-content-end pr-1 pb-1 pb-md-0">
                  <label class="d-flex align-items-center ml-1 ml-md-0">
                    Search:
                    <input
                    [(ngModel)]="searchText"
                    name="searchText"
                    type="search"
                    class="form-control search-input"
                    (input)="filterRequests()"
                  />
                  </label>

                  <button class="btn btn-primary ml-1" rippleEffect (click)="openCreate()">
                    <i data-feather="plus" class="d-sm-none d-inline-block mr-0 mr-sm-1"></i>
                    <span class="d-none d-sm-inline-block">Add</span>
                  </button>
                </div>
              </div>
          </div>

          <div class="request-table-wrap">
            <ngx-datatable
              #table
              class="bootstrap core-bootstrap request-datatable"
              [rows]="filteredRows"
              [columnMode]="'force'"
              [headerHeight]="50"
              [footerHeight]="50"
              [rowHeight]="'auto'"
              [limit]="selectedOption"
              [count]="filteredRows.length"
              [offset]="pageNumber"
              [scrollbarH]="true"
              [reorderable]="false"
              [externalPaging]="false"
            >
              <!-- View -->
              <!-- <ngx-datatable-column
                name=""
                [width]="70"
                [sortable]="false"
                [canAutoResize]="false"
                [draggable]="false"
                [resizeable]="false"
              >
                <ng-template ngx-datatable-cell-template let-row="row">
                  <div class="text-center view-cell">
                    <button
                      type="button"
                      class="view-icon-btn"
                      (click)="viewRequestDetails(row)"
                      title="View"
                    >
                     <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </ng-template>
              </ngx-datatable-column> -->

            <ngx-datatable-column
  [width]="50"
  [resizeable]="false"
  [sortable]="false"
  [draggable]="false"
  [canAutoResize]="false">
  <ng-template ngx-datatable-cell-template let-row="row">
    <span
      (click)="viewRequestDetails(row)"
      title="View Details"
      style="cursor:pointer;font-size:18px;color:#6F3C2F;">
      <i class="fas fa-eye"></i>
    </span>
  </ng-template>
</ngx-datatable-column>

              <!-- Request No -->
              <ngx-datatable-column name="REQUEST NO" prop="requestNo" [minWidth]="110">
                <ng-template ngx-datatable-cell-template let-row="row">
                  <span class="request-no">{{ row.requestNo }}</span>
                </ng-template>
              </ngx-datatable-column>

              <!-- Company -->
              <ngx-datatable-column name="COMPANY" prop="companyName" [minWidth]="150">
  <ng-template ngx-datatable-cell-template let-row="row">
    <div class="d-flex align-items-center">
      <div
        class="avatar mr-1 ml-0"
        [ngClass]="{
          'bg-light-success': row.isActive,
          'bg-light-secondary': !row.isActive
        }"
      >
        <div class="avatar-content">{{ getInitials(row.companyName) }}</div>
      </div>

      <div class="cell-line-height">
        <span class="font-weight-bold d-block">{{ row.companyName }}</span>
        <span class="text-muted font-small-2">{{ row.companyCode }}</span>
      </div>
    </div>
  </ng-template>
</ngx-datatable-column>

              <!-- From Date -->
              <ngx-datatable-column name="FROM DATE" prop="fromDate" [width]="90">
                <ng-template ngx-datatable-cell-template let-row="row">
                  {{ row.fromDate | date:'dd-MM-yyyy' }}
                </ng-template>
              </ngx-datatable-column>

              <!-- To Date -->
              <ngx-datatable-column name="TO DATE" prop="toDate" [width]="90">
                <ng-template ngx-datatable-cell-template let-row="row">
                  {{ row.toDate | date:'dd-MM-yyyy' }}
                </ng-template>
              </ngx-datatable-column>

              <!-- Total Qty -->
              <ngx-datatable-column name="TOTAL QTY" prop="totalQty" [width]="90">
                <ng-template ngx-datatable-cell-template let-row="row">
                  {{ row.totalQty }}
                </ng-template>
              </ngx-datatable-column>

              <!-- Actions -->
              <ngx-datatable-column
                *ngIf="canManageOrders"
                name="ACTIONS"
                [width]="120"
                [sortable]="false"
                [canAutoResize]="false"
                [draggable]="false"
                [resizeable]="false"
              >
                <ng-template ngx-datatable-cell-template let-row="row">
                  <div class="d-flex align-items-center justify-content-center action-group">
                    <!-- <button
                      type="button"
                      class="btn btn-outline-primary p-0 d-flex align-items-center justify-content-center action-icon-btn"
                      (click)="editRequest(row)"
                      title="Edit"
                    >
                      <i data-feather="edit" class="action-icon"></i>
                    </button> -->

                    <!-- <button
                      type="button"
                      class="btn btn-outline-danger p-0 d-flex align-items-center justify-content-center action-icon-btn"
                      (click)="deleteRequest(row)"
                      title="Delete"
                    >
                      <i data-feather="trash-2" class="action-icon"></i>
                    </button> -->
                 <button
                  type="button"
                  class="btn btn-outline-danger p-0 d-flex align-items-center justify-content-center ml-1"
                  style="width: 28px; height: 28px;"
                  (click)="deleteRequest(row)"
                  [disabled]="isEditMode"
                  title="Delete"
                >
                  <i data-feather="trash" style="width: 14px; height: 14px;"></i>
                </button>
                    <button
                      type="button"
                      class="btn btn-outline-primary p-0 d-flex align-items-center justify-content-center action-icon-btn"
                      style="width: 28px; height: 28px;"
                      (click)="openOverride(row)"
                      title="Override"
                    >
                      <i data-feather="sliders"  style="width: 14px; height: 14px;"></i>
                    </button>

                    <!-- <button
                      type="button"
                      class="btn btn-outline-success p-0 d-flex align-items-center justify-content-center action-icon-btn"
                      (click)="openOverrideList(row)"
                      title="Override List"
                    >
                      <i data-feather="list" class="action-icon"></i>
                    </button> -->
                  </div>
                </ng-template>
              </ngx-datatable-column>

              <!-- Empty -->
              <ngx-datatable-footer>
              <ng-template
                ngx-datatable-footer-template
                let-rowCount="rowCount"
                let-pageSize="pageSize"
                let-curPage="curPage"
                let-offset="offset"
              >
                <div class="datatable-footer-inner w-100 px-2">
                  <!-- <div class="page-count text-muted">
                    Showing {{ rowCount === 0 ? 0 : (offset * pageSize) + 1 }}
                    to {{ getPageEnd(rowCount, offset, pageSize) }}
                    of {{ rowCount }} entries
                  </div> -->

                  <datatable-pager
                    [page]="curPage"
                    [size]="pageSize"
                    [count]="rowCount"
                    [hidden]="rowCount <= pageSize"
                    [pagerLeftArrowIcon]="'datatable-icon-left'"
                    [pagerRightArrowIcon]="'datatable-icon-right'"
                    [pagerPreviousIcon]="'datatable-icon-prev'"
                    [pagerNextIcon]="'datatable-icon-skip'"
                    (change)="table.onFooterPage($event)"
                  >
                  </datatable-pager>
                </div>
              </ng-template>
            </ngx-datatable-footer>
            </ngx-datatable>

            <!-- <div *ngIf="filteredRows.length === 0" class="text-center text-muted py-2">
              No data available
            </div> -->
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
